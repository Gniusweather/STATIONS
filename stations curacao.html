<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Curacao Weather — Dashboard </title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

<style>
  :root{
    --bg:#071a2b; --muted:#9fb6c9; --accent:#4fb3ff;
    --ok:#16a34a; --warn:#f59e0b; --danger:#ef4444;
    --card-radius:10px; --gap:10px; --mono:Inter,system-ui,Segoe UI,Roboto,Arial;
  }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#041423);font-family:var(--mono);color:#e6f6ff}
  .wrap{max-width:1400px;margin:12px auto;padding:12px;display:grid;gap:var(--gap)}
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  h1{margin:0;font-size:18px;font-weight:700;color:var(--accent)}
  .sub{color:var(--muted);font-size:13px}
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:var(--card-radius);padding:12px;border:1px solid rgba(75,150,220,0.06)}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  input,select,button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#e6f6ff;padding:8px;border-radius:8px;font-size:13px}
  .stations{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:12px;margin-top:12px}
  @media(max-width:1200px){ .stations{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));} }
  @media(max-width:820px){ .stations{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));} }

  .station-row{display:flex;flex-direction:column;gap:10px;padding:14px;border-radius:10px;background:linear-gradient(180deg, rgba(43,156,255,0.03), rgba(11,34,54,0.02));border:1px solid rgba(255,255,255,0.03);min-height:140px}
  .station-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .station-left{display:flex;gap:12px;align-items:center}
  .station-name{font-weight:700;font-size:16px;color:var(--accent)}
  .station-meta{font-size:12px;color:var(--muted)}
  .station-params{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .param{background:rgba(255,255,255,0.02);padding:6px 10px;border-radius:8px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .param .label{font-size:11px;color:var(--muted)}
  .param .value{font-weight:800;color:#e6f6ff}
  .param.temp{font-size:18px;padding:8px 12px}
  .param.wind{font-size:18px;padding:8px 12px}
  .param.small{font-size:12px;padding:6px 8px}
  .badge{padding:6px 10px;border-radius:999px;font-weight:700;font-size:12px}
  .badge.ok{background:rgba(75,200,150,0.08);color:var(--ok)}
  .badge.warn{background:rgba(245,158,11,0.08);color:var(--warn)}
  .badge.danger{background:rgba(239,68,68,0.08);color:var(--danger)}
  .badge.error{background:rgba(200,60,90,0.12);color:#ffb3c7}
  .summary{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,0.02);font-weight:600;color:var(--muted);font-size:13px}
  .map-container{height:72vh;border-radius:10px;overflow:hidden;margin-top:12px}
  #map{width:100%;height:100%}
  .legend{background:rgba(0,0,0,0.35);padding:8px;border-radius:8px;color:#e6f6ff;font-size:13px}
  .legend .row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.ok{background:var(--ok)}
  .dot.warn{background:var(--warn)}
  .dot.danger{background:var(--danger)}
  .dot.error{background:#ffb3c7}
  .wind-rose { width:84px; height:84px; flex: 0 0 84px; }
  .wind-rose svg { width:100%; height:100%; display:block; }
  .wind-rose .speed { font-size:12px; fill:#e6f6ff; font-weight:700; text-anchor:middle; dominant-baseline:middle; }
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Curacao Weather — Dashboard</h1>
      <div class="sub">All stations on one page; wind rose shown in list and map popups.</div>
    </div>

    <div class="controls">
      <button id="toggleView">Switch to Map</button>
      <label class="small">Refresh
        <select id="interval">
          <option value="0">Manual</option>
          <option value="30000">30s</option>
          <option value="60000" selected>60s</option>
          <option value="300000">5m</option>
        </select>
      </label>
      <button id="refreshBtn">Refresh</button>
      <button id="notifyBtn">Enable notifications</button>
      <label class="small">Sort
        <select id="sortBy">
          <option value="station">Station</option>
          <option value="temperature_c" selected>Temperature</option>
          <option value="wind_speed_knots">Wind (kn)</option>
          <option value="last_updated_iso">Last updated</option>
        </select>
      </label>
      <label class="small">Order
        <select id="sortOrder"><option value="desc">Desc</option><option value="asc">Asc</option></select>
      </label>
    </div>
  </header>

  <div class="card" id="listCard">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <input id="search" type="text" placeholder="Search station..." style="width:260px" />
        <span id="lastFetched" style="color:var(--muted)">Last fetched: —</span>
      </div>

      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="small">Global thresholds</div>
        <input id="gTemp" type="number" placeholder="Temp °C" style="width:90px" />
        <input id="gWind" type="number" placeholder="Wind kn" style="width:90px" />
        <input id="gRain" type="number" placeholder="Rain mm" style="width:90px" />
        <input id="gHeat" type="number" placeholder="Heat °C" style="width:90px" />
        <button id="saveGlobal">Save</button>
        <button id="resetGlobal">Reset</button>
      </div>
    </div>

    <div class="stations" id="stationsList" aria-live="polite">
      <div class="small" style="padding:12px">Loading…</div>
    </div>

    <div class="summary" style="margin-top:12px">
      <div class="pill">Total stations: <span id="totalCount">0</span></div>
      <div class="pill">Active alerts: <span id="alertCount">0</span></div>
      <div class="pill">Stale / NOT OK: <span id="staleCount">0</span></div>
      <div class="pill">Most recent: <span id="mostRecent">—</span></div>
    </div>
  </div>

  <div class="card hidden" id="mapCard">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <input id="mapSearch" type="text" placeholder="Filter stations on map..." style="width:260px" />
        <span id="mapLastFetched" style="color:var(--muted)">Last fetched: —</span>
      </div>
      <div class="legend" id="mapLegend">
        <div class="row"><div class="dot ok"></div><div>OK</div></div>
        <div class="row"><div class="dot warn"></div><div>Alert</div></div>
        <div class="row"><div class="dot danger"></div><div>Critical</div></div>
        <div class="row"><div class="dot error"></div><div>NOT OK (date mismatch)</div></div>
      </div>
    </div>

    <div class="map-container"><div id="map"></div></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
/* CONFIG */
const API_BASE = 'https://curacao-weather-api.generast.workers.dev/'; // your API root
const COORDS = {
  "Curaçao International Airport": { lat: 12.18889, lon: -68.95972 },
  "Curacao International Airport": { lat: 12.18889, lon: -68.95972 },
  "Seru Mahuma": { lat: 12.18330, lon: -68.93330 },
  "Klein Kwartier": { lat: 11.98900, lon: -68.65050 },
  "Punda": { lat: 12.10530, lon: -68.93390 },
  "Santa Maria": { lat: 12.16720, lon: -68.93920 },
  "Savonet": { lat: 12.35060, lon: -69.10610 },
  "Soto": { lat: 12.26670, lon: -69.10000 },
  "Seinpost": { lat: 12.10000, lon: -68.85000 },
  "Sun Valley": { lat: 12.12000, lon: -68.95000 },
  "Seru Kokori": { lat: 12.20000, lon: -68.95000 },
  "Spaanse Water": { lat: 12.06730, lon: -68.85010 },
  "Steenrijk": { lat: 12.09788, lon: -68.91214 }
};
const MAP_EXCLUDE = new Set(['Klein Kwartier', 'Punda']);
const ISLAND_CENTER = { lat: 12.16957, lon: -68.99002 };
const ISLAND_BOUNDS = [[11.9177, -69.5311], [12.5478, -68.3707]];

let pollTimer = null;
let currentData = [];
let map = null;
let markersLayer = null;
let notificationsEnabled = false;

/* HELPERS */
const el = id => document.getElementById(id);
const safeNum = v => (v === null || v === undefined || v === '') ? null : Number(v);
const escapeHtml = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function parseIso(s){ if(!s) return null; const d = new Date(s); return isNaN(d) ? null : d; }
function sameLocalDate(a,b){ if(!a||!b) return false; return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

/* STORAGE */
const globalThrKey = 'global:thresholds';
function saveGlobal(thr){ localStorage.setItem(globalThrKey, JSON.stringify(thr)); }
function loadGlobal(){ return JSON.parse(localStorage.getItem(globalThrKey) || 'null'); }
function saveStationThr(station, thr){ localStorage.setItem('thr:' + station, JSON.stringify(thr)); }
function loadStationThr(station){ return JSON.parse(localStorage.getItem('thr:' + station) || 'null'); }

/* NOTIFICATIONS */
async function enableNotifications(){
  if (!('Notification' in window)) return alert('Notifications not supported');
  const p = await Notification.requestPermission();
  notificationsEnabled = (p === 'granted');
  el('notifyBtn').textContent = notificationsEnabled ? 'Notifications ON' : 'Enable notifications';
}
function notify(title, body){
  if (!notificationsEnabled) return;
  try { new Notification(title, { body }); } catch(e){ console.warn(e); }
}

/* EVALUATE */
function evaluate(row){
  const global = loadGlobal() || {};
  const stationThr = loadStationThr(row.station) || {};
  const thr = {
    temp: stationThr.temp ?? global.temp ?? null,
    wind: stationThr.wind ?? global.wind ?? null,
    rain: stationThr.rain ?? global.rain ?? null,
    heat: stationThr.heat ?? global.heat ?? null
  };
  const alerts = [];
  if (thr.temp !== null && row.temperature_c !== null && row.temperature_c >= thr.temp) alerts.push({k:'temp',v:row.temperature_c,thr:thr.temp});
  if (thr.wind !== null && row.wind_speed_knots !== null && row.wind_speed_knots >= thr.wind) alerts.push({k:'wind',v:row.wind_speed_knots,thr:thr.wind});
  if (thr.rain !== null && row.rain_today_mm !== null && row.rain_today_mm >= thr.rain) alerts.push({k:'rain',v:row.rain_today_mm,thr:thr.rain});
  if (thr.heat !== null && row.heat_index_c !== null && row.heat_index_c >= thr.heat) alerts.push({k:'heat',v:row.heat_index_c,thr:thr.heat});

  const now = new Date();
  const last = parseIso(row.last_updated_iso || row.last_updated);
  const isStaleDate = !last || !sameLocalDate(now, last);

  let severity = 0;
  if (isStaleDate) severity = 3;
  else if (alerts.length === 0) severity = 0;
  else if (alerts.length === 1) severity = 1;
  else severity = 2;

  return {alerts, severity, thr, isStaleDate};
}

/* MAP */
function initMap(){
  if (map) return;
  map = L.map('map', { zoomControl: true }).setView([ISLAND_CENTER.lat, ISLAND_CENTER.lon], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  try { map.fitBounds(ISLAND_BOUNDS, { padding: [40, 40] }); } catch(e){ console.warn(e); }
}

/* COORDS EXTRACTION */
function extractCoords(row){
  const keys = ['latitude','lat','lat_deg','longitude','lon','lng'];
  let lat = null, lon = null;
  for (const k of keys){
    if (k in row && row[k] != null){
      if (k.startsWith('lat') || k === 'latitude') lat = row[k];
      if (k.startsWith('lon') || k === 'longitude' || k === 'lng') lon = row[k];
    }
  }
  if (lat == null && row.location && row.location.lat) lat = row.location.lat;
  if (lon == null && row.location && row.location.lon) lon = row.location.lon;
  if (lat != null) lat = Number(lat);
  if (lon != null) lon = Number(lon);
  if (!isFinite(lat)) lat = null;
  if (!isFinite(lon)) lon = null;
  const name = (row.station || '').trim();
  if ((lat == null || lon == null) && name && COORDS[name]) { lat = COORDS[name].lat; lon = COORDS[name].lon; }
  return (lat != null && lon != null) ? { lat: Number(lat), lon: Number(lon) } : null;
}

/* WIND ROSE SVG generator for popups and list */
function windRoseSvg(directionDeg, speed){
  const dir = (typeof directionDeg === 'number' && isFinite(directionDeg)) ? directionDeg : null;
  const sp = (typeof speed === 'number' && isFinite(speed)) ? speed : null;
  const maxLen = 28;
  const len = sp ? Math.min(maxLen, Math.max(6, (sp / 20) * maxLen)) : 12;
  const arrowColor = sp >= 25 ? '#ef4444' : (sp >= 15 ? '#f59e0b' : '#16a34a');

  if (dir === null) {
    return `
      <div class="wind-rose" aria-hidden="true">
        <svg viewBox="0 0 84 84" role="img" aria-label="No wind direction">
          <circle cx="42" cy="42" r="30" stroke="#2b4f66" stroke-width="2" fill="none" stroke-dasharray="3 4"/>
          <text x="42" y="46" class="speed">—</text>
        </svg>
      </div>`;
  }

  const toDeg = (dir + 180) % 360;
  return `
    <div class="wind-rose" aria-hidden="true">
      <svg viewBox="0 0 84 84" role="img" aria-label="Wind ${sp ?? '—'} knots from ${dir}°">
        <defs>
          <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 z" fill="${arrowColor}"/>
          </marker>
        </defs>
        <circle cx="42" cy="42" r="30" stroke="#2b4f66" stroke-width="2" fill="none"/>
        <line x1="42" y1="12" x2="42" y2="18" stroke="#2b4f66" stroke-width="1"/>
        <line x1="42" y1="66" x2="42" y2="72" stroke="#2b4f66" stroke-width="1"/>
        <line x1="12" y1="42" x2="18" y2="42" stroke="#2b4f66" stroke-width="1"/>
        <line x1="66" y1="42" x2="72" y2="42" stroke="#2b4f66" stroke-width="1"/>
        <g transform="translate(42,42) rotate(${toDeg})">
          <line x1="0" y1="0" x2="0" y2="${-len}" stroke="${arrowColor}" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
          <circle cx="0" cy="0" r="3" fill="${arrowColor}" />
        </g>
        <text x="42" y="74" class="speed">${sp !== null ? Math.round(sp) + ' kn' : '—'}</text>
      </svg>
    </div>`;
}

/* Add markers to map with wind rose in popup */
function markerColorForSeverity(sev){
  if (sev === 3) return '#ffb3c7';
  if (sev === 2) return '#ef4444';
  if (sev === 1) return '#f59e0b';
  return '#16a34a';
}
function addMarkersToMap(rows){
  if (!map) initMap();
  markersLayer.clearLayers();
  const missingCoords = [];
  rows.forEach(r => {
    const name = (r.station || '').trim();
    if (MAP_EXCLUDE.has(name)) return;
    const coords = extractCoords(r);
    if (!coords){ missingCoords.push(name || '(unknown)'); return; }
    const ev = evaluate(r);
    const color = markerColorForSeverity(ev.severity);
    const circle = L.circleMarker([coords.lat, coords.lon], {
      radius: 10,
      fillColor: color,
      color: '#00000022',
      weight: 1,
      fillOpacity: 0.95
    });

    // prepare wind rose for popup using available wind direction and speed fields
    const windDeg = r.wind_direction_deg != null ? Number(r.wind_direction_deg) : (r.wind_direction && !isNaN(Number(r.wind_direction)) ? Number(r.wind_direction) : null);
    const windSp = r.wind_speed_knots != null ? Number(r.wind_speed_knots) : null;
    const roseHtml = windRoseSvg(windDeg, windSp);

    const popupHtml = `
      <div style="min-width:260px;display:flex;gap:10px;align-items:center">
        ${roseHtml}
        <div style="flex:1">
          <strong>${escapeHtml(r.station || '—')}</strong><br/>
          <small style="color:#9fb6c9">${escapeHtml(r.last_updated || '—')}</small>
          <hr style="margin:6px 0;border:none;border-top:1px solid rgba(255,255,255,0.04)"/>
          <div><strong>Temp:</strong> ${r.temperature_c != null ? r.temperature_c.toFixed(1)+' °C' : '—'}</div>
          <div><strong>Heat:</strong> ${r.heat_index_c != null ? r.heat_index_c.toFixed(1)+' °C' : '—'}</div>
          <div><strong>Humidity:</strong> ${r.humidity_percent != null ? r.humidity_percent+' %' : '—'}</div>
          <div><strong>Wind:</strong> ${windSp != null ? windSp+' kn' : '—'} (${r.wind_direction_text || '—'})</div>
          <div><strong>Rain today:</strong> ${r.rain_today_mm != null ? r.rain_today_mm+' mm' : '—'}</div>
        </div>
      </div>
    `;
    circle.bindPopup(popupHtml, { maxWidth: 420 });
    circle.addTo(markersLayer);
  });
  if (missingCoords.length) console.warn('Missing coords for:', missingCoords);
}

/* Render list with wind rose included (re-uses windRoseSvg) */
function renderStationsList(rows){
  const list = el('stationsList');
  if (!rows.length){ list.innerHTML = '<div class="small" style="padding:12px">No stations</div>'; return; }
  let alertCount = 0, staleCount = 0, mostRecent = null;

  list.innerHTML = rows.map(r => {
    const ev = evaluate(r);
    if (ev.alerts.length) alertCount++;
    if (ev.isStaleDate) staleCount++;
    if (!mostRecent && r.last_updated) mostRecent = r.last_updated;

    const sevClass = ev.severity === 3 ? 'error' : (ev.severity === 0 ? 'ok' : (ev.severity === 1 ? 'warn' : 'danger'));
    const sevLabel = ev.severity === 3 ? 'NOT OK' : (ev.severity === 0 ? 'OK' : (ev.severity === 1 ? 'ALERT' : 'CRITICAL'));

    const temp = r.temperature_c !== null ? r.temperature_c.toFixed(1) + '°C' : '—';
    const heat = r.heat_index_c !== null ? r.heat_index_c.toFixed(1) + '°C' : '—';
    const hum = r.humidity_percent !== null ? r.humidity_percent + ' %' : '—';
    const windKn = r.wind_speed_knots !== null ? r.wind_speed_knots : null;
    const windDirDeg = r.wind_direction_deg != null ? Number(r.wind_direction_deg) : (r.wind_direction && !isNaN(Number(r.wind_direction)) ? Number(r.wind_direction) : null);
    const windDirText = r.wind_direction_text || r.wind_direction || '—';
    const rain10 = r.rain_last_10min_mm !== null ? r.rain_last_10min_mm + ' mm' : '—';
    const rainY = r.rain_yesterday_mm !== null ? r.rain_yesterday_mm + ' mm' : '—';
    const rainT = r.rain_today_mm !== null ? r.rain_today_mm + ' mm' : '—';
    const last = r.last_updated || '—';

    const rose = windRoseSvg(windDirDeg, windKn);

    return `<div class="station-row" data-station="${escapeHtml(r.station)}" data-alerts='${JSON.stringify(ev.alerts)}' data-stale='${ev.isStaleDate}'>
      <div class="station-top">
        <div class="station-left">
          ${rose}
          <div>
            <div class="station-name">${escapeHtml(r.station)}</div>
            <div class="station-meta">${escapeHtml(last)}</div>
          </div>
        </div>

        <div style="display:flex;align-items:center;gap:8px">
          <div class="param temp"><span class="label">Temp</span><span class="value">${temp}</span></div>
          <div class="param wind"><span class="label">Wind</span><span class="value">${windKn !== null ? windKn + ' kn' : '—'}</span></div>
          <div><span class="badge ${sevClass}">${sevLabel}</span></div>
        </div>
      </div>

      <div class="station-params">
        <div class="param small"><span class="label">Heat</span><span class="value">${heat}</span></div>
        <div class="param small"><span class="label">Humidity</span><span class="value">${hum}</span></div>
        <div class="param small"><span class="label">Wind dir</span><span class="value">${windDirText}${windDirDeg!==null? ' ('+windDirDeg+'°)':''}</span></div>
        <div class="param small"><span class="label">Rain 10m</span><span class="value">${rain10}</span></div>
        <div class="param small"><span class="label">Rain yesterday</span><span class="value">${rainY}</span></div>
        <div class="param small"><span class="label">Rain today</span><span class="value">${rainT}</span></div>
      </div>
    </div>`;
  }).join('');

  el('totalCount').textContent = rows.length;
  el('alertCount').textContent = alertCount;
  el('staleCount').textContent = staleCount;
  el('mostRecent').textContent = mostRecent || '—';
}

/* Sort / filter / render */
function applySortFilterAndRender(){
  const sortBy = el('sortBy').value;
  const sortOrder = el('sortOrder').value;
  const q = el('search').value.toLowerCase();
  const filtered = currentData.filter(r => !q || (r.station && r.station.toLowerCase().includes(q)));
  filtered.sort((a,b) => {
    const va = a[sortBy] ?? null;
    const vb = b[sortBy] ?? null;
    if (typeof va === 'string' && typeof vb === 'string') return sortOrder === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    const na = (va === null || va === undefined) ? -Infinity : va;
    const nb = (vb === null || vb === undefined) ? -Infinity : vb;
    return sortOrder === 'asc' ? (na - nb) : (nb - na);
  });
  renderStationsList(filtered);
  addMarkersToMap(filtered);
}

/* Fetch */
async function fetchData(){
  try {
    const res = await fetch(API_BASE, { cache: 'no-store' });
    if (!res.ok) throw new Error('Network ' + res.status);
    const rows = await res.json();

    rows.forEach(r => {
      r.temperature_c = safeNum(r.temperature_c);
      r.heat_index_c = safeNum(r.heat_index_c);
      r.humidity_percent = safeNum(r.humidity_percent);
      r.wind_speed_knots = safeNum(r.wind_speed_knots);
      r.wind_direction_deg = r.wind_direction_deg != null ? safeNum(r.wind_direction_deg) : (r.wind_direction && !isNaN(Number(r.wind_direction)) ? Number(r.wind_direction) : null);
      r.wind_speed_kmh = safeNum(r.wind_speed_kmh);
      r.rain_last_10min_mm = safeNum(r.rain_last_10min_mm);
      r.rain_yesterday_mm = safeNum(r.rain_yesterday_mm);
      r.rain_today_mm = safeNum(r.rain_today_mm);
      if (r.last_updated_iso) r.last_updated = r.last_updated_iso;
    });

    currentData = rows;
    el('lastFetched').textContent = 'Last fetched: ' + new Date().toLocaleString();
    el('mapLastFetched').textContent = el('lastFetched').textContent;

    applySortFilterAndRender();
  } catch (e){
    console.error('fetchData error', e);
  }
}

/* UI hooks */
el('refreshBtn').addEventListener('click', fetchData);
el('notifyBtn').addEventListener('click', enableNotifications);
el('search').addEventListener('input', applySortFilterAndRender);
el('mapSearch').addEventListener('input', () => {
  const q = el('mapSearch').value.toLowerCase();
  const filtered = currentData.filter(r => !q || (r.station && r.station.toLowerCase().includes(q)));
  addMarkersToMap(filtered);
});
el('sortBy').addEventListener('change', applySortFilterAndRender);
el('sortOrder').addEventListener('change', applySortFilterAndRender);

if (el('saveGlobal')) el('saveGlobal').addEventListener('click', () => {
  const thr = {
    temp: el('gTemp').value === '' ? null : Number(el('gTemp').value),
    wind: el('gWind').value === '' ? null : Number(el('gWind').value),
    rain: el('gRain') ? (el('gRain').value === '' ? null : Number(el('gRain').value)) : null,
    heat: el('gHeat').value === '' ? null : Number(el('gHeat').value)
  };
  saveGlobal(thr);
  alert('Global thresholds saved in browser');
});
if (el('resetGlobal')) el('resetGlobal').addEventListener('click', () => {
  localStorage.removeItem(globalThrKey);
  el('gTemp').value=''; el('gWind').value=''; if (el('gRain')) el('gRain').value=''; el('gHeat').value='';
  alert('Global thresholds cleared');
});

el('interval').addEventListener('change', () => {
  if (pollTimer) clearInterval(pollTimer);
  const ms = Number(el('interval').value);
  if (ms > 0) pollTimer = setInterval(fetchData, ms);
});

/* Toggle view */
el('toggleView').addEventListener('click', () => {
  const listCard = el('listCard'), mapCard = el('mapCard');
  const isMap = !mapCard.classList.contains('hidden');
  if (isMap){
    mapCard.classList.add('hidden');
    listCard.classList.remove('hidden');
    el('toggleView').textContent = 'Switch to Map';
  } else {
    listCard.classList.add('hidden');
    mapCard.classList.remove('hidden');
    el('toggleView').textContent = 'Switch to List';
    initMap();
    addMarkersToMap(currentData);
    try { map.setView([ISLAND_CENTER.lat, ISLAND_CENTER.lon], 11); setTimeout(()=>map.invalidateSize(),200); } catch(e){ console.warn(e); }
  }
});

/* INIT */
(function init(){
  fetchData();
  initMap();
  try { map.setView([ISLAND_CENTER.lat, ISLAND_CENTER.lon], 11); } catch(e){}
  const ms = Number(el('interval').value) || 60000;
  if (ms > 0) pollTimer = setInterval(fetchData, ms);
})();
</script>
</body>
</html>
